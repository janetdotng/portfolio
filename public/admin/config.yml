backend:
  name: git-gateway
  branch: main

media_library:
  name: cloudinary
  output_filename_only: false
  use_secure_url: true
  use_transformations: true
  config:
    cloud_name: "dwj5kjslu"
    api_key: "838247772957895"
    default_transformations:
      - - fetch_format: auto
          quality: "auto:eco"
          width: 1400
          crop: limit

collections:
  - name: "showcase"
    label: "Showcase"
    label_singular: "Showcase Item"

    folder: "src/content/showcase"
    create: true
    delete: true

    slug: "{{slug}}"
    path: "{{slug}}/index"

    format: "frontmatter"
    extension: "mdx"

    identifier_field: "title"
    summary: "{{title}}"

    nested:
      depth: 2
      summary: "{{title}}"
      subfolders: true

    meta:
      path:
        widget: "string"
        label: "Folder Path"
        index_file: "index"

    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "publishDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        time_format: false
        default: ""

      - label: "Intro"
        name: "intro"
        widget: "text"
        required: false
        default: ""

      - label: "Client"
        name: "client"
        widget: "string"
        required: false
        default: ""

      - label: "Project Date"
        name: "projectDate"
        widget: "string"
        required: false
        default: ""

      - label: "Cover"
        name: "cover"
        widget: "file"
        required: true
        choose_url: true
        allow_multiple: false
        media_library:
          config:
            max_files: 1
            multiple: false

      - label: "Cover Type"
        name: "coverType"
        widget: "select"
        required: false
        default: "image"
        options:
          - { label: "Image", value: "image" }
          - { label: "Video", value: "video" }

      - label: "Cover Alt"
        name: "coverAlt"
        widget: "string"
        required: false
        hint: "Optional. If left empty, the site can fall back to the post title."

      - label: "Category"
        name: "category"
        widget: "select"
        multiple: true
        min: 1
        options:
          - { label: "Arts and Crafts", value: "artsandcrafts" }
          - { label: "Commercial", value: "commercial" }
          - { label: "Graphic Design", value: "graphicdesign" }
          - { label: "Illustrations", value: "illustrations" }
          - { label: "Live Action", value: "liveaction" }
          - { label: "Motion Graphics", value: "motiongraphics" }
          - { label: "Photography", value: "photography" }
          - { label: "UX/UI", value: "uxui" }

      - label: "Tag"
        name: "tag"
        widget: "string"
        required: false
        default: ""

      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Use Markdown or HTML/MDX. For now, keep existing figure, image, video, and embed code patterns."